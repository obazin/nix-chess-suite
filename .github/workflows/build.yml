name: build

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    # Weekly build against whatever nixpkgs-unstable has become. For the
    # classic tier this is the point of CI: upstream never changes, but the
    # toolchain does, and 2000s-era C breaks on new clang releases.
    - cron: '0 4 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    strategy:
      fail-fast: false
      matrix:
        include:
          # aarch64-darwin is the fully-verified reference platform and gates
          # the workflow. Linux is still being brought up (engines were
          # verified on aarch64-darwin first), so its jobs are non-blocking
          # until every engine is either fixed or platform-gated.
          - runner: macos-14
            system: aarch64-darwin
            blocking: true
          - runner: ubuntu-latest
            system: x86_64-linux
            blocking: false
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
            blocking: false
    name: nix (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    # Non-blocking platforms may fail without failing the workflow.
    continue-on-error: ${{ !matrix.blocking }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      # Build engines individually so one broken engine does not mask the
      # rest. `nix build .#default` would stop at the first failure.
      - name: Build all engines
        run: |
          set -uo pipefail
          # Iterate the `checks` output: it is already filtered to engines
          # whose meta.platforms includes this system, so platform-gated
          # engines (e.g. the x86-only ones on aarch64) are not attempted here.
          engines=$(nix eval --raw --impure --expr \
            'builtins.concatStringsSep "\n" (builtins.attrNames (builtins.getFlake (toString ./.)).checks.${builtins.currentSystem})')
          failed=()
          for e in $engines; do
            echo "::group::$e"
            if nix build ".#$e" --no-link --print-build-logs; then
              echo "ok: $e"
            else
              echo "::error title=build failed::$e"
              failed+=("$e")
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "Failed engines: ${failed[*]}"
            exit 1
          fi

  windows:
    # Windows is built natively rather than cross-compiled: too many of these
    # Makefiles do not survive mingw cross-compilation.
    name: windows (x86_64)
    runs-on: windows-latest
    # Non-blocking: native Windows engine builds are still being brought up.
    continue-on-error: true
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            make
            git
            curl

      - name: Build engines
        run: ./ci/build-windows.sh

      - uses: actions/upload-artifact@v4
        with:
          name: engines-windows-x86_64
          path: dist/
