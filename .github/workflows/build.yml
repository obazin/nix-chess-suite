name: build

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    # Weekly build against whatever nixpkgs-unstable has become. For the
    # classic tier this is the point of CI: upstream never changes, but the
    # toolchain does, and 2000s-era C breaks on new clang releases.
    - cron: '0 4 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    strategy:
      fail-fast: false
      matrix:
        include:
          # aarch64-darwin is the fully-verified reference platform and gates
          # the workflow. Linux is still being brought up (engines were
          # verified on aarch64-darwin first), so its jobs are non-blocking
          # until every engine is either fixed or platform-gated.
          - runner: macos-14
            system: aarch64-darwin
            blocking: true
          - runner: ubuntu-latest
            system: x86_64-linux
            blocking: false
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
            blocking: false
    name: nix (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    # Non-blocking platforms may fail without failing the workflow.
    continue-on-error: ${{ !matrix.blocking }}
    steps:
      - uses: actions/checkout@v4

      # R2 binary cache (pull): download prebuilt engine paths so runs don't
      # rebuild all 79 from source. Public read via the r2.dev URL.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = https://pub-428250a0977d4667937b8ce7e16887ce.r2.dev
            extra-trusted-public-keys = nix-chess-suite-1:5uNzouWBsIpF0iwdnTgQj2A8ZSdvFFLfV5kkiapqW9U=

      # Build engines individually so one broken engine does not mask the rest,
      # then sign + push the freshly-built paths to R2 for the next run and for
      # consumers.
      - name: Build all engines
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          NIX_SIGNING_KEY: ${{ secrets.NIX_SIGNING_KEY }}
        run: |
          set -uo pipefail
          source ./ci/r2-cache.sh   # defines r2_push(); no-op without secrets
          # Iterate the `checks` output: it is already filtered to engines
          # whose meta.platforms includes this system, so platform-gated
          # engines (e.g. the x86-only ones on aarch64) are not attempted here.
          engines=$(nix eval --raw --impure --expr \
            'builtins.concatStringsSep "\n" (builtins.attrNames (builtins.getFlake (toString ./.)).checks.${builtins.currentSystem})')
          failed=()
          for e in $engines; do
            echo "::group::$e"
            if nix build ".#$e" --no-link --print-build-logs; then
              echo "ok: $e"
              # Push this engine's closure to R2 immediately: fills the cache
              # progressively and validates auth on the first engine.
              r2_push $(nix build ".#$e" --no-link --print-out-paths)
            else
              echo "::error title=build failed::$e"
              failed+=("$e")
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "Failed engines: ${failed[*]}"
            exit 1
          fi

  windows:
    # Windows .exe are cross-compiled to mingw (UCRT) from a Linux runner using
    # the same engine derivations, via pkgsCross. No Windows runner needed.
    name: windows (x86_64, cross)
    runs-on: ubuntu-latest
    # Non-blocking: Windows cross-builds are still being brought up per engine.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = https://pub-428250a0977d4667937b8ce7e16887ce.r2.dev
            extra-trusted-public-keys = nix-chess-suite-1:5uNzouWBsIpF0iwdnTgQj2A8ZSdvFFLfV5kkiapqW9U=

      - name: Cross-build engines to Windows
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          NIX_SIGNING_KEY: ${{ secrets.NIX_SIGNING_KEY }}
        run: |
          set -uo pipefail
          source ./ci/r2-cache.sh
          # win-* packages exist only on x86_64-linux (the cross host).
          engines=$(nix eval --raw --impure --expr \
            'builtins.concatStringsSep "\n" (builtins.filter
               (n: builtins.substring 0 4 n == "win-")
               (builtins.attrNames (builtins.getFlake (toString ./.)).packages.x86_64-linux))')
          mkdir -p dist
          ok=0; fail=0; failed=""
          for e in $engines; do
            echo "::group::$e"
            if out=$(nix build ".#$e" --no-link --print-out-paths --print-build-logs); then
              cp "$out"/bin/*.exe dist/ 2>/dev/null || true
              r2_push "$out"
              ok=$((ok+1)); echo "ok: $e"
            else
              echo "::error title=cross-build failed::$e"
              fail=$((fail+1)); failed="$failed ${e#win-}"
            fi
            echo "::endgroup::"
          done
          echo "=== Windows cross summary: $ok built, $fail failed ==="
          [ -n "$failed" ] && echo "Failed:$failed"
          # Non-blocking job, so do not exit nonzero on per-engine failures;
          # the summary + annotations carry the state.
          true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engines-windows-x86_64
          path: dist/
          if-no-files-found: ignore
